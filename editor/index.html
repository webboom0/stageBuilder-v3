  <script type="module">
    import * as THREE from "three";

    import { Editor } from "./js/Editor.js";
    import { Viewport } from "./js/Viewport.js";
    import { Toolbar } from "./js/Toolbar.js";
    // import { Script } from './js/Script.js';
    import { Player } from "./js/Player.js";
    import { Sidebar } from "./js/Sidebar.js";
    import { Menubar } from "./js/Menubar.js";
    import { Resizer } from "./js/Resizer.js";
    import { VideoEdit } from "./js/VideoEdit.js";
    import { SidebarProperties } from "./js/Sidebar.Properties.js";
    import { SidebarAssets } from "./js/SidebarAssets.js";
    import { initPropertyEcBridge } from "./js/ui/PropertyEcBridge.js";
    import { ProjectSetup } from "./js/ProjectSetup.js";
    // import { Music } from './js/Music.js';
    const { createFFmpeg, fetchFile } = FFmpeg;

    window.URL = window.URL || window.webkitURL;
    window.BlobBuilder =
      window.BlobBuilder || window.WebKitBlobBuilder || window.MozBlobBuilder;

    // THREEŰą╝ ýáäýŚşýť╝Űíť ýäĄýáĽ
    window.THREE = THREE;

    // ŰîÇýÜęŰčë ýŚÉýůő(FBX Űô▒) ýÖŞŰÂÇ ÝśŞýŐĄÝîů Ű▓áýŁ┤ýŐĄ URL
    // - GitHub PagesŰŐö Git LFS ÝîîýŁ╝ýŁä ýžüýáĹ ýäťŰ╣ÖÝĽśýžÇ Ű¬╗ÝĽśŰŐö ŕ▓ŻýÜ░ŕ░Ç ŰžÄýŁî
    // - ýĽäŰ×ś ŕ░ĺýŁ┤ ý×łýť╝Űę┤ `../files/...` ýâüŰîÇŕ▓ŻŰíť ŰîÇýőá ýŚČŕŞ░ŰíťŰÂÇÝä░ ŰíťŰôťŰÉśŰĆäŰíŁ(ýśł: ŰéťýäĄ 1.fbx/2.fbx) ŕÁČýä▒ ŕ░ÇŰŐą
    // ýäĄýáĽ Ű░ęŰ▓Ľ:
    // 1) ý┐╝ŰŽČ: ?assetBase=https://<host>/<root>/  (URL ýŁŞýŻöŰöę ÝĽäýÜö)
    // 2) ýŻśýćö/ýŻöŰôť: localStorage.STAGEBUILDER_ASSET_BASE_URL = "https://<host>/<root>/"
    //    ýŁ┤ÝŤä ýâłŰíťŕ│áý╣Ę
    try {
      const params = new URLSearchParams(location.search);
      const fromQuery = params.get("assetBase");
      const fromStorage = localStorage.getItem("STAGEBUILDER_ASSET_BASE_URL");
      window.STAGEBUILDER_ASSET_BASE_URL = fromQuery || fromStorage || window.STAGEBUILDER_ASSET_BASE_URL || "";
      if (fromQuery) localStorage.setItem("STAGEBUILDER_ASSET_BASE_URL", fromQuery);
    } catch (e) {}

    let tabCounter = 0;
    const tabPanels = document.getElementById("tabPanels");
    const tabButtons = document.getElementById("tabButtons");
    const template = document.getElementById("editorTemplate");

    // Ýâş Ű▓äÝŐ╝ ýâŁýä▒ ÝĽĘýłś
    function createTabButton(tabId) {
      const tabButton = document.createElement("button");
      tabButton.className = "tabButton";
      tabButton.dataset.tabId = tabId;

      const tabText = document.createElement("span");
      tabText.textContent = `Editor ${tabId}`;

      const closeButton = document.createElement("span");
      closeButton.innerHTML = "&times;";
      closeButton.className = "closeTab";
      closeButton.style.marginLeft = "8px";
      closeButton.style.cursor = "pointer";

      tabButton.appendChild(tabText);
      // tabButton.appendChild(closeButton);

      // ŰőźŕŞ░ Ű▓äÝŐ╝ Ýü┤ŰŽş ýŁ┤Ű▓ĄÝŐŞ
      closeButton.addEventListener("click", (e) => {
        e.stopPropagation(); // Ýâş ýäáÝâŁ ýŁ┤Ű▓ĄÝŐŞ Ű░ęýžÇ
        removeTab(tabId);
      });

      return tabButton;
    }

    // createNewTab ÝĽĘýłś ýłśýáĽ (ŕŞ░ýí┤ ÝĽĘýłś ŰîÇý▓┤)
    async function createNewTab() {
      tabCounter++;

      // Ýâş Ű▓äÝŐ╝ ýâŁýä▒ (ýłśýáĽŰÉť ÝĽĘýłś ýéČýÜę)
      const tabButton = createTabButton(tabCounter);
      tabButtons.insertBefore(
        tabButton,
        document.querySelector(".addTabButton")
      );

      // Ýâş ÝîĘŰäÉ ýâŁýä▒
      const tabPanel = template.content.cloneNode(true);
      const editorTab = tabPanel.querySelector(".editorTab");
      editorTab.dataset.tabId = tabCounter;

      // DOMýŚÉ ŰĘ╝ýáÇ ýÂöŕ░Ç
      tabPanels.appendChild(editorTab);

      // ýâłŰíťýÜ┤ ýŚÉŰööÝä░ ýŁŞýŐĄÝä┤ýŐĄ ýâŁýä▒
      const editor = new Editor();
      window[`editor${tabCounter}`] = editor;
      editor.tabRoot = editorTab;

      // Ýśäý×Č ÝÖťýä▒ÝÖöŰÉť editorŰą╝ ýáäýŚşýť╝Űíť ýäĄýáĽ
      window.editor = editor;

      // ý╗┤ÝĆČŰäîÝŐŞ ý┤łŕŞ░ÝÖö ýáäýŚÉ ÝâşýŁä ÝÖťýä▒ÝÖö
      activateTab(tabCounter);

      // ýâł ÝöäŰíťýáŁÝŐŞ ýőťý×Ĺ ýőť ÝöäŰíťýáŁÝŐŞ ýäĄýáĽ ÝîŁýŚů ÝĹťýőť
      const projectSetup = new ProjectSetup();
      projectSetup.startNewProject(editor);

      // DOMýŁ┤ ýÂöŕ░ÇŰÉť ÝŤä ý╗┤ÝĆČŰäîÝŐŞ ý┤łŕŞ░ÝÖö
      const menubar = new Menubar(editor);
      editorTab.querySelector(".topMenuBar").appendChild(menubar.dom);

      // Viewport ý┤łŕŞ░ÝÖö
      const viewerElement = editorTab.querySelector(".viewer");

      viewerElement.style.width = "100%";
      viewerElement.style.height = "100%";
      viewerElement.style.minHeight = "0";

      await new Promise((resolve) => setTimeout(resolve, 100));

      const viewport = new Viewport(editor);

      // viewport DOM ýŐĄÝâÇýŁ╝ ýäĄýáĽ
      viewport.dom.style.width = "100%";
      viewport.dom.style.height = "100%";
      viewport.dom.style.position = "absolute";

      viewerElement.appendChild(viewport.dom);

      // EditorýŚÉ viewport ŕ░Łý▓┤ ýäĄýáĽ
      editor.viewport = viewport;

      // renderer ý┤łŕŞ░ÝÖöŰą╝ ýťäÝĽť ŰîÇŕŞ░
      await new Promise((resolve) => setTimeout(resolve, 100));

      // ýŁ┤ýáť rendererŕ░Ç ý┤łŕŞ░ÝÖöŰÉť ÝŤäýŚÉ resize ýŁ┤Ű▓ĄÝŐŞ Ű░ťýâŁ
      try {
        if (viewport.renderer) {
          viewport.renderer.setSize(
            viewerElement.clientWidth,
            viewerElement.clientHeight,
            true // updateStyle ÝîîŰŁ╝Ű»ŞÝä░ ýÂöŕ░Ç
          );
          viewport.renderer.setPixelRatio(window.devicePixelRatio);
          viewport.camera.aspect =
            viewerElement.clientWidth / viewerElement.clientHeight;
          viewport.camera.updateProjectionMatrix();
          viewport.render();
        }
      } catch (error) {
        console.warn("Viewport initialization failed:", error);
      }

      const toolbar = new Toolbar(editor);
      editorTab.querySelector(".toolBar").appendChild(toolbar.dom);

      const player = new Player(editor);
      editorTab.appendChild(player.dom);

      const sidebar = new Sidebar(editor);
      initPropertyEcBridge(editorTab);

      // SidebarProjectŕ░Ç ŰáîŰŹöŰčČŰą╝ ŰžîŰôá ŰĺĄ ŰĚ░ÝĆČÝŐŞ ÝüČŕŞ░ Űž×ýÂĄ
      requestAnimationFrame(() => {
        editor.signals.windowResize.dispatch();
      });
      // editorTab.querySelector(".side").appendChild(sidebar.dom);

      // const sidebarAssets = new SidebarAssets(editor);

      // const sidebarProperties = new SidebarProperties(editor);
      // editorTab.querySelector("#propertyPanel").appendChild(sidebarProperties.dom);

      // VideoEdit ý┤łŕŞ░ÝÖö
      const timelineElement = editorTab.querySelector(".timeline");
      if (timelineElement) {
        const videoEdit = new VideoEdit(editor);
        if (videoEdit.dom) {
          timelineElement.appendChild(videoEdit.dom);
        }
      }

      // Storage ý┤łŕŞ░ÝÖö Ű░Ć ýâüÝâť Ű│ÁýŤÉ
      editor.storage.init(function () {
        editor.storage.get(async function (state) {
          if (isLoadingFromHash) return;

          if (state !== undefined) {
            await editor.fromJSON(state);
          }

          const selected = editor.config.getKey("selected");

          if (selected !== undefined) {
            editor.selectByUuid(selected);
          }
        });

        let timeout;

        function saveState() {
          if (editor.config.getKey("autosave") === false) {
            return;
          }

          clearTimeout(timeout);

          timeout = setTimeout(function () {
            editor.signals.savingStarted.dispatch();

            timeout = setTimeout(function () {
              editor.storage.set(editor.toJSON());

              editor.signals.savingFinished.dispatch();
            }, 100);
          }, 1000);
        }

        const signals = editor.signals;

        signals.geometryChanged.add(saveState);
        signals.objectAdded.add(saveState);
        signals.objectChanged.add(saveState);
        signals.objectRemoved.add(saveState);
        signals.materialChanged.add(saveState);
        signals.sceneBackgroundChanged.add(saveState);
        signals.sceneEnvironmentChanged.add(saveState);
        signals.sceneFogChanged.add(saveState);
        signals.sceneGraphChanged.add(saveState);
        signals.scriptChanged.add(saveState);
      });

      // ŰžłýžÇŰžëýť╝Űíť resize ýŁ┤Ű▓ĄÝŐŞ Ű░ťýâŁ
      editor.signals.windowResize.dispatch();
    }

    function activateTab(tabId) {
      // Ű¬ĘŰôá Ýâş Ű╣äÝÖťýä▒ÝÖö
      document
        .querySelectorAll(".tabButton")
        .forEach((btn) => btn.classList.remove("active"));
      document
        .querySelectorAll(".editorTab")
        .forEach((tab) => tab.classList.remove("active"));

      // ýäáÝâŁŰÉť Ýâş ÝÖťýä▒ÝÖö
      document
        .querySelector(`.tabButton[data-tab-id="${tabId}"]`)
        .classList.add("active");
      document
        .querySelector(`.editorTab[data-tab-id="${tabId}"]`)
        .classList.add("active");

      // Ýśäý×Č ÝÖťýä▒ÝÖöŰÉť editorŰą╝ ýáäýŚşýť╝Űíť ýäĄýáĽ
      window.editor = window[`editor${tabId}`];
    }

    // Ýâş Ű▓äÝŐ╝ Ýü┤ŰŽş ýŁ┤Ű▓ĄÝŐŞ
    // document
    //   .querySelector(".addTabButton")
    //   .addEventListener("click", createNewTab);

    tabButtons.addEventListener("click", (e) => {
      if (e.target.classList.contains("tabButton")) {
        activateTab(e.target.dataset.tabId);
      }
    });

    // ý┤łŕŞ░ Ýâş ýâŁýä▒
    await createNewTab();

    document.addEventListener("dragover", function (event) {
      event.preventDefault();
      event.dataTransfer.dropEffect = "copy";
    });

    document.addEventListener("drop", function (event) {
      event.preventDefault();

      if (event.dataTransfer.types[0] === "text/plain") return; // Outliner drop

      if (event.dataTransfer.items) {
        // DataTransferItemList supports folders

        editor.loader.loadItemList(event.dataTransfer.items);
      } else {
        editor.loader.loadFiles(event.dataTransfer.files);
      }
    });

    function onWindowResize() {
      if (window.editor && window.editor.signals) {
        window.editor.signals.windowResize.dispatch();
      }
    }

    window.addEventListener("resize", onWindowResize);

    onWindowResize();

    //

    let isLoadingFromHash = false;
    const hash = window.location.hash;

    if (hash.slice(1, 6) === "file=") {
      const file = hash.slice(6);

      if (confirm(editor.strings.getKey("prompt/file/open"))) {
        const loader = new THREE.FileLoader();
        loader.crossOrigin = "";
        loader.load(file, function (text) {
          editor.clear();
          editor.fromJSON(JSON.parse(text));
        });

        isLoadingFromHash = true;
      }
    }

    // ServiceWorker ÔÇö Űíťý╗Č ŕ░ťŰ░ťýŚÉýäťŰŐö Ű╣äÝÖťýä▒ÝÖö (ŕÁČŰ▓äýáä JS ý║Éýőť Ű░ęýžÇ)
    if ("serviceWorker" in navigator) {
      const isLocalDev =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1";

      if (isLocalDev) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((r) => r.unregister());
        });
      } else {
        try {
          navigator.serviceWorker.register("sw.js");
        } catch (error) {
          console.error("Service Worker Űô▒ŰíŁ ýőĄÝîĘ:", error);
        }
      }
    }

    // Ű¬ĘŰôł ŰíťŰôť ýőĄÝîĘ ýőť ŰíťŰöę ÝÖöŰę┤ýŚÉ ýĽłŰé┤
    function showLoadingError(message) {
      const modal = document.getElementById("loading-modal");
      if (!modal || modal.dataset.errorShown === "1") return;
      modal.dataset.errorShown = "1";
      modal.classList.add("loading-error");
      modal.innerHTML = `
        <div style="font-size:16px;font-weight:600;">ýŚÉŰööÝä░ ŰíťŰôť ýőĄÝîĘ</div>
        <div class="loading-error-detail">${message}</div>
        <button type="button" onclick="location.reload()">ýâłŰíťŕ│áý╣Ę</button>
      `;
    }

    window.addEventListener("error", (e) => {
      if (e.message && /module|import|404/i.test(e.message)) {
        showLoadingError(e.message);
      }
    });

    window.addEventListener("unhandledrejection", (e) => {
      const msg = e.reason?.message || String(e.reason || "");
      if (/module|import|404|export/i.test(msg)) {
        showLoadingError(msg);
      }
    });

    // Ýâş ýéşýáť ÝĽĘýłś
    async function removeTab(tabId) {
      // Ýâş Ű▓äÝŐ╝ŕ│╝ ÝîĘŰäÉ ýÜöýćî ý░żŕŞ░
      const tabButton = document.querySelector(
        `.tabButton[data-tab-id="${tabId}"]`
      );
      const tabPanel = document.querySelector(
        `.editorTab[data-tab-id="${tabId}"]`
      );

      if (!tabButton || !tabPanel) return;

      // editor ýŁŞýŐĄÝä┤ýŐĄ ýáĽŰŽČ
      const editor = window[`editor${tabId}`];
      if (editor) {
        try {
          // renderer ýáĽŰŽČ
          if (editor.viewport && editor.viewport.renderer) {
            editor.viewport.renderer.dispose();
            editor.viewport.renderer.forceContextLoss();
            editor.viewport.renderer.domElement.remove();
          }

          // signals ýáĽŰŽČ
          if (editor.signals) {
            // Ű¬ĘŰôá signalýŁś ŰŽČýŐĄŰäł ýáťŕ▒░
            Object.keys(editor.signals).forEach((key) => {
              const signal = editor.signals[key];
              if (signal && typeof signal.removeAll === "function") {
                signal.removeAll();
              }
            });
          }

          // ŰęöŰ¬ĘŰŽČ ýáĽŰŽČ
          editor.clear();

          // ýáäýŚş Ű│ÇýłśýŚÉýäť ýáťŕ▒░
          delete window[`editor${tabId}`];
          if (window.editor === editor) {
            window.editor = null;
          }
        } catch (error) {
          console.warn("Error cleaning up editor:", error);
        }
      }

      // DOM ýÜöýćî ýáťŕ▒░
      tabButton.remove();
      tabPanel.remove();

      // ŰőĄŰąŞ ÝâşýŁ┤ ý×łŰőĄŰę┤ ý▓ź Ű▓łýžŞ ÝâşýŁä ÝÖťýä▒ÝÖö
      const remainingTabs = Array.from(
        document.querySelectorAll(".tabButton")
      ).filter((tab) => tab.dataset.tabId); // '+' Ű▓äÝŐ╝ ýáťýÖŞ

      if (remainingTabs.length > 0) {
        const firstTabId = remainingTabs[0].dataset.tabId;
        activateTab(firstTabId);
      } else {
        // ÝâşýŁ┤ ýŚćýť╝Űę┤ ýâł Ýâş ýâŁýä▒
        await createNewTab();
      }
    }

    // ýáäý▓┤ ý┤łŕŞ░ÝÖö ÝĽĘýłś
    async function resetAllTabs() {
      try {
        // Ű¬ĘŰôá Ýâş ŕ┤ÇŰáĘ ýÜöýćî ý░żŕŞ░
        const tabButtons = document.querySelectorAll(
          ".tabButton:not(.addTabButton)"
        );
        const tabPanels = document.querySelectorAll(".editorTab");

        // Ű¬ĘŰôá Ýâşŕ│╝ ŕ┤ÇŰáĘ ŰŽČýćîýŐĄ ýáťŕ▒░
        tabButtons.forEach((button) => {
          if (button && !button.classList.contains("addTabButton")) {
            button.remove();
          }
        });

        tabPanels.forEach((panel) => {
          const tabId = panel.dataset.tabId;
          if (tabId) {
            // editor ýŁŞýŐĄÝä┤ýŐĄ ýáĽŰŽČ
            const editor = window[`editor${tabId}`];
            if (editor) {
              if (editor.viewport && editor.viewport.renderer) {
                editor.viewport.renderer.dispose();
                editor.viewport.renderer.forceContextLoss();
                editor.viewport.renderer.domElement?.remove();
              }
              editor.clear();
              delete window[`editor${tabId}`];
            }
            panel.remove();
          }
        });

        // ýáäýŚş Ű│Çýłś ý┤łŕŞ░ÝÖö
        window.editor = null;

        // tabCounter ý┤łŕŞ░ÝÖö
        tabCounter = 0;

        // DOMýŁ┤ ýÖäýáäÝ×ł ýáĽŰŽČŰÉá ŰĽîŕ╣îýžÇ ý×áýőť ŰîÇŕŞ░
        await new Promise((resolve) => setTimeout(resolve, 100));

        // ýâł Ýâş ýâŁýä▒
        await createNewTab();

        // ýŁîýĽů ý┤łŕŞ░ÝÖö (VideoEdit.jsýŁś initMusic ÝĽĘýłś ÝśŞýÂť)
        if (typeof initMusic === "function") {
          await initMusic();
        }
      } catch (error) {
        console.error("Error during reset:", error);
        // ýŚÉŰčČ Ű░ťýâŁ ýőťýŚÉŰĆä ýâł Ýâş ýâŁýä▒ ýőťŰĆä
        tabCounter = 0;
        await createNewTab();
      }
    }

    // ýáäýŚşýť╝Űíť resetAllTabs ÝĽĘýłś ŰůŞýÂť
    window.resetAllTabs = resetAllTabs;

    // ý┤łŕŞ░ ýäĄýáĽ
    document.addEventListener("DOMContentLoaded", async () => {
      await createNewTab();
    });
  </script>
